<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriCam – Recettes Camerounaises</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--g:#1a6b3c;--gl:#2daa5f;--y:#f5c842;--r:#c0392b;--bg:#0b150e;--card:#111c14;--card2:#162019;--border:rgba(255,255,255,0.07);--text:#e8f0ea;--muted:#6b8c72}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem}
.page-header{text-align:center;margin-bottom:2.5rem}
.page-header h1{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:#fff}
.page-header h1 span{color:var(--y)}
.page-header p{color:var(--muted);margin-top:0.5rem}
.stats-bar{display:flex;justify-content:center;gap:3rem;margin:1.5rem 0 2.5rem;flex-wrap:wrap}
.stat{text-align:center}
.stat-n{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--gl)}
.stat-l{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
/* FILTERS */
.filters{display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center;margin-bottom:2rem}
.filter-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);padding:0.45rem 1.1rem;border-radius:100px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Instrument Sans',sans-serif}
.filter-btn:hover,.filter-btn.active{background:var(--g);color:#fff;border-color:var(--g)}
.search-wrap{display:flex;justify-content:center;margin-bottom:2rem}
.search-field{display:flex;align-items:center;gap:0.8rem;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:0.8rem 1.2rem;width:100%;max-width:500px}
.search-field input{background:none;border:none;color:#fff;font-size:0.95rem;flex:1;outline:none;font-family:'Instrument Sans',sans-serif}
.search-field input::placeholder{color:var(--muted)}
/* GRID */
.recipes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem;max-width:1400px;margin:0 auto}
.recipe-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:all 0.25s;position:relative}
.recipe-card:hover{transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.4);border-color:rgba(45,170,95,0.3)}
.rc-top{padding:1.3rem 1.3rem 1rem;position:relative}
.rc-emoji{font-size:2.8rem;margin-bottom:0.6rem;display:block}
.rc-badges{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.6rem}
.badge{font-size:0.62rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:100px;text-transform:uppercase;letter-spacing:0.06em}
.badge-region{background:rgba(245,200,66,0.12);color:var(--y)}
.badge-cat{background:rgba(45,170,95,0.12);color:var(--gl)}
.badge-diet{background:rgba(96,165,250,0.12);color:#60a5fa}
.rc-name{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;color:#fff;margin-bottom:0.3rem}
.rc-desc{font-size:0.78rem;color:var(--muted);line-height:1.5}
.rc-meta{display:flex;gap:1rem;padding:0.8rem 1.3rem;border-top:1px solid var(--border);background:rgba(255,255,255,0.02)}
.rc-meta-item{display:flex;align-items:center;gap:0.3rem;font-size:0.72rem;color:var(--muted)}
.rc-cals{position:absolute;top:1rem;right:1rem;background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.2);color:var(--y);font-size:0.75rem;font-weight:800;padding:0.25rem 0.6rem;border-radius:100px}
.rc-nutrition{display:grid;grid-template-columns:repeat(3,1fr);gap:0.4rem;padding:0.8rem 1.3rem;background:rgba(255,255,255,0.015);border-top:1px solid var(--border)}
.n-item{text-align:center}
.n-val{font-size:0.82rem;font-weight:700;color:#fff}
.n-label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.rc-footer{padding:0.8rem 1.3rem;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border)}
.rc-difficulty{font-size:0.72rem;color:var(--muted)}
.rc-btn{background:var(--g);color:#fff;border:none;border-radius:8px;padding:0.4rem 1rem;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:background 0.2s}
.rc-btn:hover{background:var(--gl)}
/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);align-items:flex-start;justify-content:center;padding:2rem;overflow-y:auto}
.modal-ov.open{display:flex}
.modal-box{background:#0e1a11;border:1px solid var(--border);border-radius:24px;padding:2.5rem;width:100%;max-width:680px;margin:auto;animation:fadeUp 0.3s ease;position:relative}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:1.5rem;right:1.5rem;background:rgba(255,255,255,0.08);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.modal-emoji{font-size:3.5rem;margin-bottom:1rem;display:block}
.modal-header-badges{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.8rem}
.modal-title{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:#fff;margin-bottom:0.5rem}
.modal-desc{color:var(--muted);line-height:1.6;margin-bottom:1.5rem}
.modal-nutrition{display:grid;grid-template-columns:repeat(4,1fr);gap:0.8rem;margin-bottom:1.8rem}
.mn-card{background:rgba(255,255,255,0.04);border-radius:12px;padding:0.8rem;text-align:center}
.mn-val{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#fff}
.mn-label{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
.modal-section{margin-bottom:1.5rem}
.modal-section h4{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gl);margin-bottom:0.8rem}
.ing-grid{display:flex;flex-wrap:wrap;gap:0.5rem}
.ing-pill{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:0.35rem 0.8rem;font-size:0.78rem;color:var(--text)}
.steps-list{display:flex;flex-direction:column;gap:0.8rem}
.step-row{display:flex;gap:1rem;align-items:flex-start}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--g);color:#fff;font-weight:800;font-size:0.78rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-text{color:rgba(255,255,255,0.75);font-size:0.85rem;line-height:1.6}
.tips-box{background:rgba(245,200,66,0.07);border:1px solid rgba(245,200,66,0.2);border-radius:12px;padding:1rem;font-size:0.82rem;color:rgba(255,255,255,0.7);line-height:1.6}
.tips-box strong{color:var(--y)}
.no-results{text-align:center;padding:4rem 2rem;color:var(--muted)}
.no-results span{font-size:3rem;display:block;margin-bottom:1rem}
.count-label{text-align:center;color:var(--muted);font-size:0.82rem;margin-bottom:1.5rem}
</style>
</head>
<body>

<div class="page-header">
  <h1>🍲 Recettes <span>Camerounaises</span></h1>
  <p>Base de données nutritionnelle complète · 52 plats traditionnels</p>

<div class="stats-bar">
  <div class="stat"><div class="stat-n">52</div><div class="stat-l">Recettes</div></div>
  <div class="stat"><div class="stat-n">10</div><div class="stat-l">Régions</div></div>
  <div class="stat"><div class="stat-n">100%</div><div class="stat-l">Valeurs nutri.</div></div>
  <div class="stat"><div class="stat-n">6</div><div class="stat-l">Catégories</div></div>
</div>

<div class="search-wrap">

    <span>🔍</span>
    <input type="text" id="search" placeholder="Rechercher : ndolé, poulet DG, eru..." oninput="renderAll()"/>
  </div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" onclick="setFilter('tous',this)">🍽️ Tous</button>
  <button class="filter-btn" onclick="setFilter('plat',this)">🥘 Plats principaux</button>
  <button class="filter-btn" onclick="setFilter('accompagnement',this)">🌽 Accompagnements</button>
  <button class="filter-btn" onclick="setFilter('soupe',this)">🍜 Soupes & Bouillons</button>
  <button class="filter-btn" onclick="setFilter('snack',this)">🥜 Snacks & Street food</button>
  <button class="filter-btn" onclick="setFilter('boisson',this)">🥤 Boissons</button>
  <button class="filter-btn" onclick="setFilter('dessert',this)">🍮 Desserts</button>
</div>

<div class="count-label" id="count-label">52 recettes</div>
<div class="recipes-grid" id="recipes-grid"></div>

<!-- MODAL -->
<div class="modal-ov" id="modal" onclick="maybeClose(event)">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

let activeFilter = 'tous';

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function renderAll() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = recipes.filter(r => {
    const matchCat = activeFilter==='tous' || r.cat===activeFilter;
    const matchQ = !q || r.name.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q) || r.region.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  document.getElementById('count-label').textContent = `${filtered.length} recette${filtered.length>1?'s':''}`;
  const grid = document.getElementById('recipes-grid');
  if(filtered.length===0){
    grid.innerHTML=`<div class="no-results" style="grid-column:1/-1"><span>🔍</span>Aucune recette trouvée pour "${q}"</div>`;
    return;
  }
  grid.innerHTML = filtered.map(r=>`
    <div class="recipe-card" onclick="openRecipe(${r.id})">
      <div class="rc-top">
        <div class="rc-cals">🔥 ${r.kcal} kcal</div>
        <span class="rc-emoji">${r.emoji}</span>
        <div class="rc-badges">
          <span class="badge badge-region">📍 ${r.region}</span>
          <span class="badge badge-cat">${catLabel(r.cat)}</span>
          ${r.diet?`<span class="badge badge-diet">${r.diet}</span>`:''}
        </div>
        <div class="rc-name">${r.name}</div>
        <div class="rc-desc">${r.desc.substring(0,80)}...</div>
      </div>
      <div class="rc-nutrition">
        <div class="n-item"><div class="n-val" style="color:#4ade80">${r.prot}g</div><div class="n-label">Protéines</div></div>
        <div class="n-item"><div class="n-val" style="color:#fbbf24">${r.carb}g</div><div class="n-label">Glucides</div></div>
        <div class="n-item"><div class="n-val" style="color:#f87171">${r.fat}g</div><div class="n-label">Lipides</div></div>
      </div>
      <div class="rc-meta">
        <div class="rc-meta-item">⏱ ${r.time} min</div>
        <div class="rc-meta-item">👥 ${r.serves} pers.</div>
        <div class="rc-meta-item">📊 ${r.diff}</div>
      </div>
      <div class="rc-footer">
        <div class="rc-difficulty">${diffEmoji(r.diff)} ${r.diff}</div>
        <button class="rc-btn">Voir recette</button>
      </div>
    </div>
  `).join('');
}

function catLabel(c){
  return {plat:'🥘 Plat',accompagnement:'🌽 Accomp.',soupe:'🍜 Soupe',snack:'🥜 Snack',boisson:'🥤 Boisson',dessert:'🍮 Dessert'}[c]||c;
}
function diffEmoji(d){return {Facile:'🟢',Moyen:'🟡',Difficile:'🔴'}[d]||'⚪'}

function openRecipe(id){
  const r = recipes.find(x=>x.id===id);
  if(!r)return;
  document.getElementById('modal-content').innerHTML=`
    <span class="modal-emoji">${r.emoji}</span>
    <div class="modal-header-badges">
      <span class="badge badge-region">📍 ${r.region}</span>
      <span class="badge badge-cat">${catLabel(r.cat)}</span>
      <span class="badge" style="background:rgba(255,255,255,0.06);color:#aaa">⏱ ${r.time} min</span>
      <span class="badge" style="background:rgba(255,255,255,0.06);color:#aaa">👥 ${r.serves} pers.</span>
    </div>
    <div class="modal-title">${r.name}</div>
    <div class="modal-desc">${r.desc}</div>
    <div class="modal-nutrition">
      <div class="mn-card"><div class="mn-val">${r.kcal}</div><div class="mn-label">kcal</div></div>
      <div class="mn-card"><div class="mn-val" style="color:#4ade80">${r.prot}g</div><div class="mn-label">Protéines</div></div>
      <div class="mn-card"><div class="mn-val" style="color:#fbbf24">${r.carb}g</div><div class="mn-label">Glucides</div></div>
      <div class="mn-card"><div class="mn-val" style="color:#f87171">${r.fat}g</div><div class="mn-label">Lipides</div></div>
    </div>
    <div class="modal-section">
      <h4>🛒 Ingrédients (${r.serves} personnes)</h4>
      <div class="ing-grid">${r.ing.map(i=>`<span class="ing-pill">${i}</span>`).join('')}</div>
    </div>
    <div class="modal-section">
      <h4>👨‍🍳 Préparation étape par étape</h4>
      <div class="steps-list">${r.steps.map((s,i)=>`<div class="step-row"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join('')}</div>
    </div>
    <div class="modal-section">
      <div class="tips-box">💡 ${r.tip}</div>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open')}
function maybeClose(e){if(e.target===document.getElementById('modal'))closeModal()}

renderAll();
</script>
