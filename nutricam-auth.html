<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NutriCam — Inscription / Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #1a7a4a;
      --green-light: #25a464;
      --gold: #e8a020;
      --cream: #fdf8f0;
      --dark: #0f1f15;
      --muted: #6b7c72;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      background: var(--dark);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: #fff;
      text-decoration: none;
    }
    .logo span { color: var(--gold); }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, var(--dark) 0%, #1a3a26 100%);
      color: #fff;
      text-align: center;
      padding: 36px 24px 56px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 900;
      margin-bottom: 8px;
    }
    .hero h1 em { color: var(--gold); font-style: normal; }
    .hero p { font-size: 0.9rem; opacity: 0.7; }

    /* CONTAINER */
    .container {
      max-width: 440px;
      margin: -24px auto 0;
      padding: 0 16px 60px;
      width: 100%;
    }

    /* CARD */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      overflow: hidden;
      animation: slideUp 0.4s ease both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* TABS */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 2px solid #f0f0f0;
    }
    .tab {
      padding: 16px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .tab.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    /* FORM */
    .form-panel { padding: 24px; display: none; }
    .form-panel.active { display: block; }

    .input-group { margin-bottom: 14px; }
    .input-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.92rem;
      font-family: 'DM Sans', sans-serif;
      background: #fafafa;
      color: var(--dark);
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(26,122,74,0.1);
      background: #fff;
    }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ALERT */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 14px;
      display: none;
    }
    .alert.show { display: block; }
    .alert.success { background: #e8f5ee; color: #1a5c35; border: 1px solid #b0ddc0; }
    .alert.error { background: #fef0f0; color: #8b1a1a; border: 1px solid #f5c0c0; }

    /* BUTTON */
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(26,122,74,0.3);
      margin-top: 6px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(26,122,74,0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin: 16px 0 0;
    }
    .divider a {
      color: var(--green);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    /* PLAN SELECTOR */
    .plan-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .plan-opt {
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
    }
    .plan-opt.active {
      border-color: var(--green);
      background: #f0faf4;
    }
    .plan-opt .plan-icon { font-size: 1.2rem; margin-bottom: 2px; }
    .plan-opt .plan-label { font-size: 0.78rem; font-weight: 600; color: #333; }
    .plan-opt .plan-price { font-size: 0.68rem; color: var(--muted); }

    .section-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<header class="header">
  <a href="nutricam-hub.html" class="logo">🥗 Nutri<span>Cam</span></a>
</header>

<section class="hero">
  <h1>Bienvenue sur <em>NutriCam</em></h1>
  <p>Votre coach nutrition intelligent pour l'Afrique</p>
</section>

<div class="container">
  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-inscription" onclick="switchTab('inscription')">✨ S'inscrire</div>
      <div class="tab" id="tab-connexion" onclick="switchTab('connexion')">🔑 Se connecter</div>
    </div>

    <!-- ===== INSCRIPTION ===== -->
    <div class="form-panel active" id="panel-inscription">
      <div id="alert-inscription" class="alert"></div>

      <div class="row2">
        <div class="input-group">
          <label>Prénom *</label>
          <input type="text" id="reg-prenom" placeholder="Marie" autocomplete="given-name"/>
        </div>
        <div class="input-group">
          <label>Nom *</label>
          <input type="text" id="reg-nom" placeholder="Kamga" autocomplete="family-name"/>
        </div>
      </div>

      <div class="input-group">
        <label>Email *</label>
        <input type="email" id="reg-email" placeholder="marie@exemple.com" autocomplete="email"/>
      </div>

      <div class="input-group">
        <label>Téléphone (WhatsApp)</label>
        <input type="tel" id="reg-telephone" placeholder="+237 6XX XXX XXX" autocomplete="tel"/>
      </div>

      <div class="row2">
        <div class="input-group">
          <label>Poids (kg)</label>
          <input type="number" id="reg-poids" placeholder="65" min="30" max="200"/>
        </div>
        <div class="input-group">
          <label>Objectif calories</label>
          <input type="number" id="reg-calories" placeholder="2000" min="1000" max="5000"/>
        </div>
      </div>

      <div class="section-label">Votre plan</div>
      <div class="plan-options">
        <div class="plan-opt active" id="plan-gratuit" onclick="selectPlan('gratuit')">
          <div class="plan-icon">🆓</div>
          <div class="plan-label">Gratuit</div>
          <div class="plan-price">2 questions/jour</div>
        </div>
        <div class="plan-opt" id="plan-premium" onclick="selectPlan('premium')">
          <div class="plan-icon">⭐</div>
          <div class="plan-label">Premium</div>
          <div class="plan-price">2 500 FCFA/mois</div>
        </div>
      </div>

      <button class="btn" id="btn-inscription" onclick="inscrire()">
        <div class="spinner"></div>
        <div class="btn-text">🚀 Créer mon compte</div>
      </button>
      <div class="divider">Déjà inscrit ? <a onclick="switchTab('connexion')">Se connecter</a></div>
    </div>

    <!-- ===== CONNEXION ===== -->
    <div class="form-panel" id="panel-connexion">
      <div id="alert-connexion" class="alert"></div>

      <div class="input-group">
        <label>Email *</label>
        <input type="email" id="login-email" placeholder="votre@email.com" autocomplete="email"/>
      </div>

      <div class="input-group">
        <label>Mot de passe *</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <button class="btn" id="btn-connexion" onclick="connecter()">
        <div class="spinner"></div>
        <div class="btn-text">🔑 Se connecter</div>
      </button>
      <div class="divider">Pas encore de compte ? <a onclick="switchTab('inscription')">S'inscrire</a></div>
    </div>

  </div>
</div>

<script>
  const SB_URL = 'https://jtwobuhxleejuroiqgyk.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0d29idWh4bGVlanVyb2lxZ3lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjkxMDQsImV4cCI6MjA5MjY0NTEwNH0.r4fC4P3GJIPHFnpdoBmfBQ3a0nTAAjeCI52qBBnjO6E';

  let selectedPlan = 'gratuit';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    document.querySelectorAll('.form-panel').forEach(function(p){ p.classList.remove('active'); });
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  function selectPlan(plan) {
    selectedPlan = plan;
    document.querySelectorAll('.plan-opt').forEach(function(el){ el.classList.remove('active'); });
    document.getElementById('plan-' + plan).classList.add('active');
  }

  function showAlert(panelId, msg, type) {
    var el = document.getElementById('alert-' + panelId);
    el.textContent = msg;
    el.className = 'alert ' + type + ' show';
    setTimeout(function(){ el.classList.remove('show'); }, 5000);
  }

  function setLoading(btnId, loading) {
    var btn = document.getElementById(btnId);
    btn.disabled = loading;
    if (loading) btn.classList.add('loading');
    else btn.classList.remove('loading');
  }

  async function inscrire() {
    var prenom = document.getElementById('reg-prenom').value.trim();
    var nom = document.getElementById('reg-nom').value.trim();
    var email = document.getElementById('reg-email').value.trim();
    var telephone = document.getElementById('reg-telephone').value.trim();
    var poids = parseFloat(document.getElementById('reg-poids').value) || null;
    var calories = parseInt(document.getElementById('reg-calories').value) || 2000;

    if (!prenom) { showAlert('inscription', 'Veuillez entrer votre prénom.', 'error'); return; }
    if (!nom) { showAlert('inscription', 'Veuillez entrer votre nom.', 'error'); return; }
    if (!email || !email.includes('@')) { showAlert('inscription', 'Email invalide.', 'error'); return; }

    setLoading('btn-inscription', true);

    try {
      var res = await fetch(SB_URL + '/rest/v1/utilisateurs', {
        method: 'POST',
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates'
        },
        body: JSON.stringify({
          prenom: prenom,
          nom: nom,
          email: email,
          telephone: telephone || null,
          plan: selectedPlan,
          calories_objectif: calories,
          poids: poids
        })
      });

      if (!res.ok) {
        var err = await res.json();
        throw new Error(err.message || 'Erreur sauvegarde');
      }

      localStorage.setItem('nutricam_user', JSON.stringify({
        prenom: prenom, nom: nom, email: email,
        plan: selectedPlan, calories_objectif: calories
      }));

      showAlert('inscription', 'Bienvenue ' + prenom + ' ! Compte créé avec succès.', 'success');

      setTimeout(function() {
        if (selectedPlan === 'premium') {
          window.location.href = 'nutricam-payment.html';
        } else {
          window.location.href = 'nutricam-chatbot.html';
        }
      }, 1800);

    } catch(err) {
      showAlert('inscription', 'Erreur : ' + (err.message || 'Vérifiez votre connexion.'), 'error');
    } finally {
      setLoading('btn-inscription', false);
    }
  }

  async function connecter() {
    var email = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value.trim();

    if (!email || !email.includes('@')) { showAlert('connexion', 'Email invalide.', 'error'); return; }
    if (!password) { showAlert('connexion', 'Entrez votre mot de passe.', 'error'); return; }

    setLoading('btn-connexion', true);

    try {
      var res = await fetch(SB_URL + '/rest/v1/utilisateurs?email=eq.' + encodeURIComponent(email), {
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY
        }
      });
      var data = await res.json();
      if (data && data.length > 0) {
        localStorage.setItem('nutricam_user', JSON.stringify(data[0]));
        showAlert('connexion', 'Bienvenue ' + data[0].prenom + ' !', 'success');
        setTimeout(function(){ window.location.href = 'nutricam-chatbot.html'; }, 1500);
      } else {
        showAlert('connexion', 'Aucun compte trouvé avec cet email.', 'error');
      }
    } catch(err) {
      showAlert('connexion', 'Erreur de connexion. Vérifiez votre réseau.', 'error');
    } finally {
      setLoading('btn-connexion', false);
    }
  }

  document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      var activePanel = document.querySelector('.form-panel.active').id;
      if (activePanel === 'panel-inscription') inscrire();
      else if (activePanel === 'panel-connexion') connecter();
    }
  });
</script>
</body>
</html>
