<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriCam – Inscription & Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900&family=Cabinet+Grotesk:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#030805;--s2:#0c1a0e;--gold:#f0a500;--green:#16a34a;--gl:#22c55e;--red:#ef4444;--border:rgba(255,255,255,0.06);--border2:rgba(34,197,94,0.15);--text:#dff0e2;--muted:#3d6047}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cabinet Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
.logo{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;color:#fff;text-align:center;margin-bottom:0.3rem}
.logo em{color:var(--gold);font-style:italic}
.tagline{font-size:0.82rem;color:var(--muted);text-align:center;margin-bottom:2rem}
.card{background:var(--s2);border:1px solid var(--border2);border-radius:24px;padding:2rem;width:100%;max-width:440px}
.tabs{display:flex;background:rgba(255,255,255,0.04);border-radius:12px;padding:4px;margin-bottom:1.5rem;gap:4px}
.tab{flex:1;padding:0.6rem;border:none;border-radius:9px;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;transition:all 0.2s;color:var(--muted);background:none}
.tab.active{background:var(--green);color:#fff}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
.fg{margin-bottom:1rem}
label{font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.09em;color:var(--muted);display:block;margin-bottom:0.4rem}
input{width:100%;background:rgba(255,255,255,0.04);border:1.5px solid var(--border);border-radius:12px;padding:0.8rem 1rem;color:#fff;font-size:0.9rem;font-family:'Cabinet Grotesk',sans-serif;outline:none;transition:border-color 0.2s}
input:focus{border-color:var(--border2)}
input::placeholder{color:var(--muted)}
.plans{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:1rem}
.plan{border:2px solid var(--border);border-radius:12px;padding:0.8rem;cursor:pointer;transition:all 0.2s;text-align:center}
.plan.sel{border-color:var(--gl);background:rgba(34,197,94,0.06)}
.plan-icon{font-size:1.3rem;display:block;margin-bottom:0.2rem}
.plan-name{font-size:0.82rem;font-weight:800;color:#fff}
.plan-price{font-size:0.7rem;color:var(--muted)}
.plan-badge{font-size:0.58rem;background:rgba(240,165,0,0.15);color:var(--gold);padding:0.1rem 0.4rem;border-radius:4px;display:inline-block;margin-top:0.2rem}
.btn{width:100%;background:linear-gradient(135deg,var(--green),var(--gl));border:none;border-radius:12px;padding:0.95rem;font-size:0.95rem;font-weight:800;color:#fff;cursor:pointer;font-family:'Cabinet Grotesk',sans-serif;transition:all 0.2s;margin-top:0.5rem}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,0.35)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.msg{padding:0.8rem 1rem;border-radius:10px;font-size:0.82rem;margin-top:0.8rem;display:none;line-height:1.5}
.msg.ok{background:rgba(34,197,94,0.1);border:1px solid var(--border2);color:var(--gl);display:block}
.msg.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;display:block}
.note{text-align:center;font-size:0.72rem;color:var(--muted);margin-top:0.8rem}
.back{text-align:center;margin-top:1.2rem;font-size:0.8rem;color:var(--muted)}
.back a{color:var(--gl);text-decoration:none;font-weight:700}
.sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:0.4rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="logo">Nutri<em>Cam</em></div>
<div class="tagline">🌿 La première plateforme nutritionnelle africaine 🇨🇲</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" onclick="showTab('ins')">✨ Inscription</button>
    <button class="tab" onclick="showTab('con')">🔐 Connexion</button>
  </div>

  <!-- INSCRIPTION -->
  <div id="tab-ins">
    <div class="row2">
      <div class="fg"><label>Prénom</label><input type="text" id="i-prenom" placeholder="Madeleine"/></div>
      <div class="fg"><label>Nom</label><input type="text" id="i-nom" placeholder="Yangon"/></div>
    </div>
    <div class="fg"><label>Email</label><input type="email" id="i-email" placeholder="votre@email.com"/></div>
    <div class="fg"><label>Téléphone WhatsApp</label><input type="tel" id="i-tel" placeholder="690531335"/></div>
    <div class="fg"><label>Mot de passe (min. 6 caractères)</label><input type="password" id="i-pass" placeholder="••••••••"/></div>
    <label style="margin-bottom:0.5rem;display:block">Votre plan</label>
    <div class="plans">
      <div class="plan sel" id="pl-free" onclick="selPlan('free')">
        <span class="plan-icon">🆓</span>
        <div class="plan-name">Gratuit</div>
        <div class="plan-price">0 FCFA</div>
      </div>
      <div class="plan" id="pl-prem" onclick="selPlan('premium')">
        <span class="plan-icon">⭐</span>
        <div class="plan-name">Premium</div>
        <div class="plan-price">2 500 FCFA/mois</div>
        <span class="plan-badge">Recommandé</span>
      </div>
    </div>
    <button class="btn" id="i-btn" onclick="inscrire()">🌿 Créer mon compte</button>
    <div class="msg" id="i-msg"></div>
    <div class="note">En vous inscrivant, vous acceptez nos <a href="nutricam-legal.html" style="color:var(--gl)">CGU</a></div>
  </div>

  <!-- CONNEXION -->
  <div id="tab-con" style="display:none">
    <div class="fg"><label>Email</label><input type="email" id="c-email" placeholder="votre@email.com"/></div>
    <div class="fg"><label>Mot de passe</label><input type="password" id="c-pass" placeholder="••••••••"/></div>
    <button class="btn" id="c-btn" onclick="connecter()">🔐 Se connecter</button>
    <div class="msg" id="c-msg"></div>
  </div>
</div>

<div class="back"><a href="nutricam-hub.html">← Retour à l'accueil NutriCam</a></div>

<script>
const SURL='https://jtwobuhxleejuroiqgyk.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0d29idWh4bGVlanVyb2lxZ3lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcyMjIyNzksImV4cCI6MjA2Mjc5ODI3OX0.Lv-pLvrcDaIVfkHC8nJnqiYKJB6O5PATkKO_8N2KBDQ';
const sb=supabase.createClient(SURL,SKEY);
let plan='free';

function selPlan(p){
  plan=p;
  document.getElementById('pl-free').classList.toggle('sel',p==='free');
  document.getElementById('pl-prem').classList.toggle('sel',p==='premium');
}

function showTab(t){
  document.getElementById('tab-ins').style.display=t==='ins'?'':'none';
  document.getElementById('tab-con').style.display=t==='con'?'':'none';
  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&t==='ins')||(i===1&&t==='con'));
  });
}

function msg(id,type,text){
  const el=document.getElementById(id);
  el.className='msg '+type;
  el.textContent=text;
}

async function inscrire(){
  const prenom=document.getElementById('i-prenom').value.trim();
  const nom=document.getElementById('i-nom').value.trim();
  const email=document.getElementById('i-email').value.trim();
  const telephone=document.getElementById('i-tel').value.trim();
  const password=document.getElementById('i-pass').value;

  if(!prenom||!email||!password){
    msg('i-msg','err','❌ Prénom, email et mot de passe sont obligatoires');return;
  }
  if(password.length<6){msg('i-msg','err','❌ Mot de passe trop court (min. 6 caractères)');return;}

  const btn=document.getElementById('i-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="sp"></span>Création...';

  try{
    // Créer compte auth
    const{data,error}=await sb.auth.signUp({email,password,options:{data:{prenom,nom}}});
    if(error)throw error;

    // Sauvegarder profil dans table utilisateurs
    const userId=data.user?.id;
    if(userId){
      const{error:dbErr}=await sb.from('utilisateurs').insert({
        id:userId,
        prenom,
        nom,
        email,
        telephone:telephone||null,
        plan,
        created_at:new Date().toISOString()
      });
      if(dbErr)console.warn('Profil insert:',dbErr.message);
    }

    msg('i-msg','ok','🎉 Bienvenue sur NutriCam ! Redirection...');
    btn.innerHTML='✅ Compte créé !';
    setTimeout(()=>{window.location.href='nutricam-hub.html';},2000);

  }catch(e){
    let m='❌ '+e.message;
    if(e.message?.includes('already registered'))m='❌ Email déjà utilisé — connectez-vous !';
    if(e.message?.includes('rate limit'))m='❌ Trop de tentatives. Attendez 1 minute.';
    msg('i-msg','err',m);
    btn.disabled=false;
    btn.innerHTML='🌿 Créer mon compte';
  }
}

async function connecter(){
  const email=document.getElementById('c-email').value.trim();
  const password=document.getElementById('c-pass').value;
  if(!email||!password){msg('c-msg','err','❌ Email et mot de passe requis');return;}

  const btn=document.getElementById('c-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="sp"></span>Connexion...';

  try{
    const{error}=await sb.auth.signInWithPassword({email,password});
    if(error)throw error;
    msg('c-msg','ok','✅ Connecté ! Redirection...');
    setTimeout(()=>{window.location.href='nutricam-hub.html';},1500);
  }catch(e){
    let m='❌ '+e.message;
    if(e.message?.includes('Invalid'))m='❌ Email ou mot de passe incorrect';
    msg('c-msg','err',m);
    btn.disabled=false;
    btn.innerHTML='🔐 Se connecter';
  }
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(document.getElementById('tab-ins').style.display!=='none')inscrire();
  else connecter();
});
</script>
</body>
</html>
