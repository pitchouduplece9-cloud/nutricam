<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriCam – Recettes du Monde · Afrikanische & Europäische Küche</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,800&family=Epilogue:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#06080a;--surface:#0d1117;--card:#131920;--card2:#1a2330;
  --gold:#f5a623;--green:#22c55e;--gl:#16a34a;--red:#ef4444;--blue:#3b82f6;
  --teal:#14b8a6;--purple:#a855f7;--orange:#f97316;--pink:#ec4899;
  --border:rgba(255,255,255,0.07);--text:#e2eaf2;--muted:#4d6070;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Epilogue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── NAV ── */
.nav{background:rgba(6,8,10,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0.9rem 2rem;display:flex;align-items:center;gap:1.2rem;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:900;color:#fff;white-space:nowrap}
.nav-logo span{color:var(--gold)}
.nav-search{flex:1;max-width:400px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:100px;padding:0.5rem 1rem;color:#fff;font-size:0.85rem;font-family:'Epilogue',sans-serif;outline:none;transition:all 0.2s}
.nav-search:focus{border-color:rgba(245,166,35,0.4);background:rgba(255,255,255,0.08)}
.nav-search::placeholder{color:var(--muted)}
.nav-right{display:flex;align-items:center;gap:0.6rem;margin-left:auto}

/* LANGUAGE SWITCHER */
.lang-switcher{display:flex;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:100px;padding:3px;gap:2px}
.lang-btn{background:none;border:none;border-radius:100px;padding:0.3rem 0.8rem;font-size:0.72rem;font-weight:800;cursor:pointer;font-family:'Epilogue',sans-serif;transition:all 0.2s;color:var(--muted)}
.lang-btn.active{background:var(--gold);color:#000}
.lang-btn:hover:not(.active){color:#fff}

/* ── HERO ── */
.hero{padding:4rem 2rem 3rem;text-align:center;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(245,166,35,0.06),transparent),radial-gradient(ellipse 50% 40% at 80% 100%,rgba(34,197,94,0.04),transparent);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:0.4rem;background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.2);color:var(--gold);font-size:0.72rem;font-weight:800;padding:0.3rem 1rem;border-radius:100px;margin-bottom:1.2rem;text-transform:uppercase;letter-spacing:0.1em;animation:fadeDown 0.6s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.hero-title{font-family:'Fraunces',serif;font-size:clamp(2.2rem,5vw,4rem);font-weight:900;color:#fff;line-height:0.95;margin-bottom:0.8rem;animation:fadeUp 0.7s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.hero-title .accent{color:var(--gold);font-style:italic}
.hero-sub{color:var(--muted);font-size:0.92rem;line-height:1.7;max-width:550px;margin:0 auto 2rem;animation:fadeUp 0.7s 0.1s ease both}
.hero-stats{display:flex;gap:2.5rem;justify-content:center;flex-wrap:wrap;animation:fadeUp 0.7s 0.2s ease both}
.hs-val{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:900;color:#fff}
.hs-label{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:0.1rem}

/* ── CONTINENT TABS ── */
.continent-nav{display:flex;gap:0.5rem;padding:1.5rem 2rem;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--surface)}
.continent-nav::-webkit-scrollbar{height:3px}
.continent-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.cn-btn{display:flex;align-items:center;gap:0.5rem;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:100px;padding:0.5rem 1.2rem;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:'Epilogue',sans-serif;transition:all 0.2s;color:var(--muted);white-space:nowrap;flex-shrink:0}
.cn-btn:hover{color:#fff;border-color:rgba(255,255,255,0.15)}
.cn-btn.active{color:#000;border-color:transparent}

/* ── MAIN ── */
.main{max-width:1300px;margin:0 auto;padding:2.5rem 2rem}

/* COUNTRY SECTION */
.country-section{margin-bottom:3.5rem;animation:fadeUp 0.4s ease}
.cs-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.cs-flag{font-size:2rem;flex-shrink:0}
.cs-country{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:900;color:#fff}
.cs-count{font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:0.15rem 0.6rem;border-radius:100px}
.cs-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* RECIPE GRID */
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.recipe-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:all 0.25s;position:relative}
.recipe-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,0.12);box-shadow:0 16px 48px rgba(0,0,0,0.3)}
.rc-top{height:130px;display:flex;align-items:center;justify-content:center;font-size:4.5rem;position:relative;overflow:hidden;flex-shrink:0}
.rc-country-badge{position:absolute;top:0.7rem;left:0.7rem;font-size:1.1rem;background:rgba(0,0,0,0.4);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.rc-tag{position:absolute;top:0.7rem;right:0.7rem;font-size:0.6rem;font-weight:800;padding:0.15rem 0.55rem;border-radius:100px;text-transform:uppercase;letter-spacing:0.06em}
.rc-body{padding:1.1rem}
.rc-name{font-family:'Fraunces',serif;font-size:1rem;font-weight:900;color:#fff;margin-bottom:0.25rem;line-height:1.25}
.rc-origin{font-size:0.7rem;color:var(--muted);margin-bottom:0.5rem;font-weight:600}
.rc-desc{font-size:0.76rem;color:var(--muted);line-height:1.55;margin-bottom:0.8rem}
.rc-macros{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.7rem}
.rcm-item{font-size:0.65rem;font-weight:800;padding:0.15rem 0.5rem;border-radius:4px;font-family:'DM Mono',monospace}
.rc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:0.7rem;border-top:1px solid var(--border)}
.rf-time{font-size:0.72rem;color:var(--muted);display:flex;align-items:center;gap:0.3rem}
.rf-diff{font-size:0.68rem;font-weight:800;padding:0.12rem 0.5rem;border-radius:4px}
.rf-add{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:7px;padding:0.3rem 0.7rem;font-size:0.72rem;font-weight:700;color:var(--text);cursor:pointer;font-family:'Epilogue',sans-serif;transition:all 0.15s}
.rf-add:hover{background:var(--gold);color:#000;border-color:var(--gold)}

/* RECIPE MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:28px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;animation:scaleIn 0.3s ease}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
.mb-header{padding:2rem 2rem 0;display:flex;align-items:flex-start;gap:1rem}
.mb-emoji{font-size:4rem;flex-shrink:0}
.mb-title{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:0.3rem;line-height:1.2}
.mb-origin{font-size:0.8rem;color:var(--muted);font-weight:600}
.mb-close{background:rgba(255,255,255,0.06);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:0.9rem;color:var(--muted);display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0}
.mb-macros{display:flex;gap:0.7rem;padding:1.2rem 2rem;flex-wrap:wrap}
.mbm-item{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:0.7rem 1rem;text-align:center;flex:1;min-width:70px}
.mbmi-val{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:900;color:#fff}
.mbmi-label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:0.2rem}
.mb-body{padding:0 2rem 2rem}
.mb-section{margin-bottom:1.2rem}
.mbs-title{font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.09em;color:var(--gold);margin-bottom:0.7rem}
.mbs-list{display:flex;flex-direction:column;gap:0.4rem}
.mbl-item{font-size:0.83rem;color:var(--text);padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:flex-start;gap:0.5rem;line-height:1.5}
.mbl-num{width:20px;height:20px;border-radius:50%;background:rgba(245,166,35,0.12);color:var(--gold);font-size:0.65rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.mb-add-btn{width:100%;background:linear-gradient(135deg,var(--gold),#f59e0b);border:none;border-radius:14px;padding:0.9rem;font-size:0.9rem;font-weight:800;color:#000;cursor:pointer;font-family:'Epilogue',sans-serif;transition:all 0.2s;margin-top:0.5rem}
.mb-add-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(245,166,35,0.3)}

/* EMPTY */
.empty-state{text-align:center;padding:4rem;color:var(--muted)}
.es-icon{font-size:3rem;margin-bottom:1rem;display:block;opacity:0.4}

/* SEARCH HIGHLIGHT */
mark{background:rgba(245,166,35,0.2);color:var(--gold);border-radius:2px;padding:0 2px}

@media(max-width:768px){.recipe-grid{grid-template-columns:1fr 1fr}.main{padding:1.5rem 1rem}.hero{padding:2.5rem 1rem 2rem}}
@media(max-width:480px){.recipe-grid{grid-template-columns:1fr}}
</style>
</head>

let currentRecipe = null;

// ── RENDER ──
function getContinent(id) { return countries.find(c=>c.id===id)?.continent; }

function renderContinentNav() {
  const t = i18n[currentLang];
  const buttons = [
    {id:'all', label:t.all, color:'#f5a623'},
    {id:'africa', label:t.africa, color:'#22c55e'},
    {id:'europe', label:t.europe, color:'#3b82f6'},
  ];
  document.getElementById('continent-nav').innerHTML = buttons.map(b=>`
    <button class="cn-btn ${currentContinent===b.id?'active':''}"
      style="${currentContinent===b.id?'background:'+b.color+';color:#000;border-color:'+b.color:''}"
      onclick="setContinent('${b.id}',this,'${b.color}')">${b.label}</button>`).join('');
}

function renderMain() {
  const t = i18n[currentLang];
  const filtered = countries.filter(c => {
    const matchContinent = currentContinent === 'all' || c.continent === currentContinent;
    return matchContinent;
  });

  let html = '';
  filtered.forEach(country => {
    const recipes = country.recipes.filter(r => {
      if(!searchQuery) return true;
      const q = searchQuery.toLowerCase();
      return r.name[currentLang].toLowerCase().includes(q) ||
             r.desc[currentLang].toLowerCase().includes(q) ||
             country.name[currentLang].toLowerCase().includes(q);
    });
    if(!recipes.length) return;

    html += `<div class="country-section" id="country-${country.id}">
      <div class="cs-header">
        <span class="cs-flag">${country.flag}</span>
        <div class="cs-country">${country.name[currentLang]}</div>
        <div class="cs-count">${recipes.length} ${t.recipes.toLowerCase()}</div>
        <div class="cs-line"></div>
      </div>
      <div class="recipe-grid">
        ${recipes.map(r => renderRecipeCard(r, country)).join('')}
      </div>
    </div>`;
  });

  document.getElementById('main-content').innerHTML = html ||
    `<div class="empty-state"><span class="es-icon">🔍</span><div>Aucune recette trouvée</div></div>`;
}

function getDiffLabel(diff) {
  const t = i18n[currentLang];
  return diff==='easy'?t.diff_easy:diff==='med'?t.diff_med:t.diff_hard;
}

function getDiffColor(diff) {
  return diff==='easy'?'rgba(34,197,94,0.15);color:#22c55e':diff==='med'?'rgba(251,191,36,0.15);color:#fbbf24':'rgba(239,68,68,0.15);color:#ef4444';
}

function getTagLabel(tag) {
  const t = i18n[currentLang];
  const map = {traditional:t.traditional,vegetarian:t.vegetarian,festive:t.festive,street:t.street};
  return map[tag]||tag;
}

function getTagColor(tag) {
  const map = {traditional:'rgba(59,130,246,0.15);color:#3b82f6',vegetarian:'rgba(34,197,94,0.15);color:#22c55e',festive:'rgba(245,166,35,0.15);color:#f5a623',street:'rgba(239,68,68,0.15);color:#ef4444'};
  return map[tag]||'rgba(255,255,255,0.1);color:#fff';
}

function renderRecipeCard(r, country) {
  const t = i18n[currentLang];
  const bgColors = {
    'cameroun':'linear-gradient(135deg,#052a14,#0a3d1e)',
    'senegal':'linear-gradient(135deg,#0a1f08,#1a3d10)',
    'cote-ivoire':'linear-gradient(135deg,#2d1100,#4a2000)',
    'nigeria':'linear-gradient(135deg,#051a0a,#0a3015)',
    'rdc':'linear-gradient(135deg,#00100a,#001f30)',
    'france':'linear-gradient(135deg,#00052a,#0a0f2d)',
    'allemagne':'linear-gradient(135deg,#1a0000,#2d0000)',
    'italie':'linear-gradient(135deg,#002008,#003015)',
    'espagne':'linear-gradient(135deg,#2a0000,#400000)',
  };
  return `
    <div class="recipe-card" onclick="openModal('${country.id}','${r.id}')">
      <div class="rc-top" style="background:${bgColors[country.id]||'#131920'}">
        <span class="rc-country-badge">${country.flag}</span>
        <span class="rc-tag" style="background:${getTagColor(r.tag).split(';')[0]};${getTagColor(r.tag).split(';')[1]}">${getTagLabel(r.tag)}</span>
        <span>${r.emoji}</span>
      </div>
      <div class="rc-body">
        <div class="rc-name">${r.name[currentLang]}</div>
        <div class="rc-origin">📍 ${r.origin[currentLang]}</div>
        <div class="rc-desc">${r.desc[currentLang].substring(0,90)}...</div>
        <div class="rc-macros">
          <span class="rcm-item" style="background:rgba(251,191,36,0.1);color:#fbbf24">${r.cal} kcal</span>
          <span class="rcm-item" style="background:rgba(34,197,94,0.1);color:#22c55e">${r.prot}g ${t.prot}</span>
          <span class="rcm-item" style="background:rgba(239,68,68,0.1);color:#ef4444">${r.fat}g ${t.fat}</span>
        </div>
        <div class="rc-footer">
          <div class="rf-time">⏱ ${r.time} ${t.min}</div>
          <div class="rf-diff" style="background:${getDiffColor(r.diff).split(';')[0]};${getDiffColor(r.diff).split(';')[1]}">${getDiffLabel(r.diff)}</div>
          <button class="rf-add" onclick="event.stopPropagation();addToJournal('${r.name[currentLang]}',${r.cal})">+</button>
        </div>
      </div>
    </div>`;
}

function openModal(countryId, recipeId) {
  const country = countries.find(c=>c.id===countryId);
  const r = country?.recipes.find(x=>x.id===recipeId);
  if(!r) return;
  currentRecipe = {r, country};
  const t = i18n[currentLang];
  document.getElementById('modal-box').innerHTML = `
    <div class="mb-header">
      <span class="mb-emoji">${r.emoji}</span>
      <div>
        <div class="mb-title">${r.name[currentLang]}</div>
        <div class="mb-origin">${country.flag} ${r.origin[currentLang]} · ⏱ ${r.time} ${t.min} · ${getDiffLabel(r.diff)}</div>
      </div>
      <button class="mb-close" onclick="closeModal()">✕</button>
    </div>
    <div class="mb-macros">
      <div class="mbm-item"><div class="mbmi-val" style="color:#fbbf24">${r.cal}</div><div class="mbmi-label">${t.cal}</div></div>
      <div class="mbm-item"><div class="mbmi-val" style="color:#22c55e">${r.prot}g</div><div class="mbmi-label">${t.prot}</div></div>
      <div class="mbm-item"><div class="mbmi-val" style="color:#fbbf24">${r.carb}g</div><div class="mbmi-label">${t.carb}</div></div>
      <div class="mbm-item"><div class="mbmi-val" style="color:#ef4444">${r.fat}g</div><div class="mbmi-label">${t.fat}</div></div>
      <div class="mbm-item"><div class="mbmi-val" style="color:#a855f7">${r.fiber}g</div><div class="mbmi-label">${t.fiber}</div></div>
    </div>
    <div class="mb-body">
      <div style="font-size:0.85rem;color:#c9d1d9;line-height:1.65;margin-bottom:1.2rem">${r.desc[currentLang]}</div>
      <div class="mb-section">
        <div class="mbs-title">🥬 ${t.ingredients}</div>
        <div class="mbs-list">${r.ingredients[currentLang].map(i=>`<div class="mbl-item">• ${i}</div>`).join('')}</div>
      </div>
      <div class="mb-section">
        <div class="mbs-title">👨‍🍳 ${t.steps}</div>
        <div class="mbs-list">${r.steps[currentLang].map((s,i)=>`<div class="mbl-item"><span class="mbl-num">${i+1}</span>${s}</div>`).join('')}</div>
      </div>
      <div style="font-size:0.72rem;color:#4d6070;margin-bottom:0.5rem;text-align:center">${t.per_portion}</div>
      <button class="mb-add-btn" onclick="addToJournal('${r.name[currentLang].replace(/'/g,"\\'")}',${r.cal});closeModal()">🍽️ ${t.add_journal}</button>
    </div>`;
  document.getElementById('recipe-modal').classList.add('open');
}

function closeModal() { document.getElementById('recipe-modal').classList.remove('open'); }

function addToJournal(name, cal) {
  const t = i18n[currentLang];
  const msgs = {fr:`✅ "${name}" ajouté au journal ! +${cal} kcal`,en:`✅ "${name}" added to journal! +${cal} kcal`,de:`✅ "${name}" zum Tagebuch hinzugefügt! +${cal} kcal`};
  alert(msgs[currentLang]);
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.documentElement.lang = lang;
  document.getElementById('search-input').placeholder = i18n[lang].search;
  document.getElementById('hero-badge').textContent = '';
  document.getElementById('hero-badge').textContent = i18n[lang].badge;
  document.getElementById('hero-title').innerHTML = i18n[lang].title;
  document.getElementById('hero-sub').textContent = i18n[lang].sub;
  renderContinentNav();
  renderMain();
  if(currentRecipe) openModal(currentRecipe.country.id, currentRecipe.r.id);
}

function setContinent(id, btn, color) {
  currentContinent = id;
  renderContinentNav();
  renderMain();
}

function handleSearch(q) {
  searchQuery = q;
  renderMain();
}

// INIT
renderContinentNav();
renderMain();
</script>
</body>
</html>
